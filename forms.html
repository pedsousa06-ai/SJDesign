<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJDesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/forms.css">
<body>
    
    <section class="section-form">

        <div>

        <h2>Get in Touch</h2>
        <p>Have a question or a project in mind? I'd love to hear from you. Let's chat and make something amazing together.</p>

        </div>

        <div class="contact-informations">
            <img src="./src/assets/images/telefone.svg" alt="Telefone tocando">
            <p>+1205 5872 321</p>

            <img src="./src/assets/images/email.svg" alt="Email">
            <p> contact@sarajonesdesign.com</p>

            <img src="./src/assets/images/localizador.svg" alt="Logo de um localizador">
            <p>1234 Design Street,Creativeville, Webland,Imaginary State, 98765</p>
        </div>

        <div class="social-medias">
            <img src="./src/assets/images/twitter.svg" alt="Twitter">
            <img src="./src/assets/images/instagram.svg" alt="Instagram">
            <img src="./src/assets/images/rede de internet.svg" alt="Internet">
            <img src="./src/assets/images/facebook.svg" alt="Facebook">
        </div>

        <div class="contact-section">

        <form>

            <input type="name" placeholder="First name">
            <input type="email" placeholder="Email">
            <input type="phone-number" placeholder="Phone number">
            <input type="message" placeholder="Your message">
            <button type="submit">Send message</button>
        
        </form>

        </div>

    </section>

</body>
</html>
